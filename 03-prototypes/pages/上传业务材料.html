<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFinder - 上传业务材料</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Fira Sans', 'sans-serif'],
                    },
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#60A5FA',
                        cta: '#F97316',
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="../styles/global.css">
    <script src="../entry-nav.js"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans">
    <!-- Navigation -->
    <nav class="fixed top-4 left-4 right-4 z-50">
        <div class="max-w-6xl mx-auto bg-white/80 backdrop-blur-lg rounded-2xl shadow-lg border border-slate-200/50 px-6 py-4">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-primary to-secondary rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                    </div>
                    <div>
                        <h1 class="text-lg font-semibold text-primary">AI-LeadFinder</h1>
                        <p class="text-xs text-muted">智能获客引擎</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2 px-3 py-1.5 bg-accent/10 rounded-lg">
                        <svg class="w-4 h-4 text-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                        </svg>
                        <span class="text-sm font-medium text-accent">60,000 Credits</span>
                    </div>
                    <div class="w-9 h-9 bg-secondary rounded-full flex items-center justify-center">
                        <span class="text-sm font-medium text-white">O</span>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 pb-24 px-4">
        <div class="max-w-4xl mx-auto">
            <!-- Progress Steps -->
            <div class="mb-12">
                <div class="flex items-center justify-center gap-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-medium">1</div>
                        <span class="text-sm font-medium text-primary">数据来源</span>
                    </div>
                    <div class="w-16 h-0.5 bg-primary"></div>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-sm font-medium animate-pulse">2</div>
                        <span class="text-sm font-medium text-primary">业务分析</span>
                    </div>
                    <div class="w-16 h-0.5 bg-slate-200"></div>
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-slate-200 text-slate-400 flex items-center justify-center text-sm font-medium">3</div>
                        <span class="text-sm text-slate-400">报告确认</span>
                    </div>
                </div>
            </div>

            <!-- Header -->
            <div class="text-center mb-10">
                <h1 class="text-3xl font-bold text-slate-800 mb-4">上传业务材料</h1>
                <p class="text-slate-500">上传产品目录、公司介绍、服务介绍等材料，AI 将自动提取关键业务信息</p>
            </div>

            <!-- Upload Zone -->
            <div id="uploadZone" class="upload-zone bg-white rounded-2xl border-2 border-dashed border-slate-300 p-12 text-center mb-8 cursor-pointer hover:border-primary hover:bg-blue-50/30">
                <div class="flex flex-col items-center">
                    <div class="w-16 h-16 bg-blue-50 rounded-2xl flex items-center justify-center mb-4">
                        <svg class="w-8 h-8 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                    </div>
                    <h3 class="text-lg font-semibold text-slate-700 mb-2">拖拽文件到此处上传</h3>
                    <p class="text-sm text-slate-500 mb-4">推荐上传：产品目录、公司介绍、服务介绍</p>
                    <div class="flex items-center gap-4 text-xs text-slate-400">
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                            PDF / WORD / MD / TXT
                        </span>
                        <span class="flex items-center gap-1">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                            </svg>
                            单文件最大 5MB
                        </span>
                    </div>
                </div>
                <input type="file" id="fileInput" class="hidden" multiple accept=".pdf,.doc,.docx,.md,.txt">
            </div>

            <!-- Uploaded Files -->
            <div id="fileList" class="space-y-3 mb-8"></div>

            <!-- Summary Card -->
            <div class="bg-gradient-to-r from-blue-50 to-indigo-50 rounded-2xl border border-blue-100 p-6 mb-8">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 bg-white rounded-xl flex items-center justify-center shadow-sm">
                            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                            </svg>
                        </div>
                        <div>
                            <p class="text-sm text-slate-500">已上传材料</p>
                            <p class="text-2xl font-bold text-slate-800"><span id="fileCount">0</span> 个文件</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm text-slate-500">预计分析时长</p>
                        <p class="text-lg font-semibold text-primary">约 2-5 分钟</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Action Bar -->
    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 py-4 px-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <button onclick="window.location.href='业务初始化.html'" class="px-6 py-3 text-slate-600 hover:text-slate-800 transition-colors flex items-center gap-2 cursor-pointer">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
                返回上一步
            </button>
            <button id="submitBtn" class="px-8 py-3 bg-slate-200 text-slate-400 rounded-xl font-medium cursor-not-allowed transition-all flex items-center gap-2" disabled>
                <span>提交分析</span>
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/>
                </svg>
            </button>
        </div>
    </footer>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const fileCountEl = document.getElementById('fileCount');
        const submitBtn = document.getElementById('submitBtn');
        let uploadedFiles = [];

        uploadZone.addEventListener('click', () => fileInput.click());

        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });

        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });

        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const validTypes = ['application/pdf', 'application/msword', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'text/markdown', 'text/plain'];
            const maxSize = 5 * 1024 * 1024;

            Array.from(files).forEach(file => {
                if (uploadedFiles.length >= 3) {
                    alert('最多只能上传 3 个文件');
                    return;
                }

                if (!validTypes.includes(file.type)) {
                    alert(`不支持的文件格式: ${file.name}`);
                    return;
                }

                if (file.size > maxSize) {
                    alert(`文件过大: ${file.name}，最大支持 5MB`);
                    return;
                }

                uploadedFiles.push(file);
                renderFileList();
            });
        }

        function renderFileList() {
            fileList.innerHTML = uploadedFiles.map((file, index) => {
                const icons = {
                    'application/pdf': '<svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM8.5 13h1c.83 0 1.5.67 1.5 1.5S10.33 16 9.5 16H9v1H7.5v-4h1zm3.5 0h1.5v4H12v-4zm3 0h2c.55 0 1 .45 1 1v1c0 .55-.45 1-1 1h-.5v1H15v-4z"/></svg>',
                    'application/msword': '<svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM9.5 13c1.38 0 2.5 1.12 2.5 2.5S10.88 18 9.5 18H8v2H6v-7h3.5zM10 13h1.5v2H10v-2zm2.5 0h1.5v2H12.5v-2zm0-3h2.5v2H12.5V10z"/></svg>',
                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': '<svg class="w-5 h-5 text-blue-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM9.5 13c1.38 0 2.5 1.12 2.5 2.5S10.88 18 9.5 18H8v2H6v-7h3.5zM10 13h1.5v2H10v-2zm2.5 0h1.5v2H12.5v-2zm0-3h2.5v2H12.5V10z"/></svg>',
                    'text/markdown': '<svg class="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 2l5 5h-5V4zM8 12h2.5v2H8v-2zm0 3h2.5v2H8v-2zm5-3h2.5v5H13v-5z"/></svg>',
                    'text/plain': '<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'
                };

                return `
                    <div class="file-item bg-white rounded-xl border border-slate-200 p-4 flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 bg-slate-50 rounded-lg flex items-center justify-center">
                                ${icons[file.type] || '<svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>'}
                            </div>
                            <div>
                                <p class="font-medium text-slate-700">${file.name}</p>
                                <p class="text-sm text-slate-400">${formatFileSize(file.size)}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-3">
                            <button onclick="removeFile(${index})" class="p-2 text-slate-400 hover:text-red-500 transition-colors cursor-pointer" title="删除">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;
            }).join('');

            fileCountEl.textContent = uploadedFiles.length;
            updateSubmitButton();
        }

        function removeFile(index) {
            uploadedFiles.splice(index, 1);
            renderFileList();
        }

        function formatFileSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function updateSubmitButton() {
            if (uploadedFiles.length > 0) {
                submitBtn.disabled = false;
                submitBtn.className = 'px-8 py-3 bg-primary text-white rounded-xl font-medium cursor-pointer transition-all hover:bg-blue-600 flex items-center gap-2';
            } else {
                submitBtn.disabled = true;
                submitBtn.className = 'px-8 py-3 bg-slate-200 text-slate-400 rounded-xl font-medium cursor-not-allowed transition-all flex items-center gap-2';
            }
        }

        submitBtn.addEventListener('click', () => {
            if (uploadedFiles.length > 0) {
                window.location.href = 'AI业务分析中.html?source=upload';
            }
        });
    </script>

</body>
</html>
