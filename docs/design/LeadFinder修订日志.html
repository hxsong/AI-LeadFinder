        const typeMap = {
            'all': ['初始版本', '功能迭代', 'BUG修复', '优化调整'],
            'feature': ['功能迭代'],
            'bugfix': ['BUG修复'],
            'optimization': ['优化调整']
        };

        function filterRevisions(type) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('bg-white', 'border', 'border-slate-200', 'text-slate-600');
            });

            const activeBtn = document.getElementById('filter-' + type);
            activeBtn.classList.add('active');
            activeBtn.classList.remove('bg-white', 'border', 'border-slate-200', 'text-slate-600');

            const container = document.getElementById('revisions-container');
            container.innerHTML = '';

            const allowedTypes = typeMap[type] || typeMap['all'];
            const filtered = revisionData.filter(r => allowedTypes.includes(r.type));

            filtered.forEach(revision => {
                container.appendChild(createRevisionItem(revision));
            });

            document.getElementById('total-count').textContent = filtered.length;
        }

        function createRevisionItem(revision) {
            const typeClass = {
                '初始版本': 'type-initial',
                '功能迭代': 'type-feature',
                'BUG修复': 'type-bugfix',
                '优化调整': 'type-optimization'
            }[revision.type] || 'type-initial';

            const div = document.createElement('div');
            div.className = 'revision-item bg-white rounded-2xl border border-slate-200 p-6 relative';
            div.dataset.type = revision.type;

            div.innerHTML = `
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="text-lg font-semibold text-slate-800">${revision.version}</span>
                        <span class="type-badge ${typeClass}">${revision.type}</span>
                    </div>
                    <span class="text-sm text-slate-500">${revision.date}</span>
                </div>
                <div class="mb-4">
                    <h3 class="font-medium text-slate-700 mb-2">变更概述</h3>
                    <p class="text-slate-600">${revision.summary}</p>
                </div>
                ${revision.details && revision.details.length > 0 ? `
                <div class="mb-4">
                    <h3 class="font-medium text-slate-700 mb-2">变更详情</h3>
                    <ul class="text-sm text-slate-600 space-y-1">
                        ${revision.details.map(d => `<li class="flex items-start gap-2"><span class="text-primary mt-1">•</span>${d}</li>`).join('')}
                    </ul>
                </div>
                ` : ''}
                ${revision.affectedFiles && revision.affectedFiles.length > 0 ? `
                <div>
                    <h3 class="font-medium text-slate-700 mb-2">影响范围</h3>
                    <div class="flex flex-wrap">
                        ${revision.affectedFiles.map(f => `<span class="file-tag">${f}</span>`).join('')}
                    </div>
                </div>
                ` : ''}
            `;

            return div;
        }

        document.addEventListener('DOMContentLoaded', function() {
            filterRevisions('all');
        });
    </script>
